<div class="auth-page">
  <div class="auth-card">
    <div class="auth-card__header">
      <h1 class="auth-card__title">Iniciar sesión</h1>
      <p class="auth-card__subtitle">Bienvenido de vuelta</p>
    </div>

    @if (error) {
      <div class="auth-card__alert">{{ error }}</div>
    }

    <form [formGroup]="form" (ngSubmit)="submit()" class="auth-form">
      <div class="form-group">
        <label class="form-group__label" for="email">Correo electrónico</label>
        <input
          id="email"
          type="email"
          formControlName="email"
          class="form-group__input"
          [class.form-group__input--error]="form.get('email')?.invalid && form.get('email')?.touched"
          placeholder="correo@ejemplo.com"
        />
        @if (form.get('email')?.invalid && form.get('email')?.touched) {
          <span class="form-group__error">Ingresa un correo válido</span>
        }
      </div>

      <div class="form-group">
        <label class="form-group__label" for="password">Contraseña</label>
        <input
          id="password"
          type="password"
          formControlName="password"
          class="form-group__input"
          [class.form-group__input--error]="form.get('password')?.invalid && form.get('password')?.touched"
          placeholder="••••••••"
        />
        @if (form.get('password')?.invalid && form.get('password')?.touched) {
          <span class="form-group__error">Mínimo 6 caracteres</span>
        }
      </div>

      <button type="submit" class="auth-form__submit" [disabled]="loading || form.invalid">
        {{ loading ? 'Ingresando...' : 'Ingresar' }}
      </button>
    </form>

    <div class="auth-card__footer">
      <p>¿No tienes cuenta? <a routerLink="/register" class="auth-card__link">Regístrate</a></p>
    </div>
  </div>
</div>
